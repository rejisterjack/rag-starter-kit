<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8bc34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="#1a1a2e" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Lighthouse Performance Scores</text>
  
  <!-- Performance -->
  <circle cx="120" cy="110" r="50" fill="none" stroke="#4caf50" stroke-width="8"/>
  <circle cx="120" cy="110" r="50" fill="none" stroke="#2e7d32" stroke-width="8" stroke-dasharray="280" stroke-dashoffset="14" transform="rotate(-90 120 110)"/>
  <text x="120" y="115" text-anchor="middle" fill="#4caf50" font-family="Arial, sans-serif" font-size="28" font-weight="bold">95</text>
  <text x="120" y="180" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="14">Performance</text>
  
  <!-- Accessibility -->
  <circle cx="280" cy="110" r="50" fill="none" stroke="#4caf50" stroke-width="8"/>
  <circle cx="280" cy="110" r="50" fill="none" stroke="#2e7d32" stroke-width="8" stroke-dasharray="280" stroke-dashoffset="6" transform="rotate(-90 280 110)"/>
  <text x="280" y="115" text-anchor="middle" fill="#4caf50" font-family="Arial, sans-serif" font-size="28" font-weight="bold">98</text>
  <text x="280" y="180" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="14">Accessibility</text>
  
  <!-- Best Practices -->
  <circle cx="440" cy="110" r="50" fill="none" stroke="#4caf50" stroke-width="8"/>
  <circle cx="440" cy="110" r="50" fill="none" stroke="#2e7d32" stroke-width="8" stroke-dasharray="314" stroke-dashoffset="0" transform="rotate(-90 440 110)"/>
  <text x="440" y="115" text-anchor="middle" fill="#4caf50" font-family="Arial, sans-serif" font-size="28" font-weight="bold">100</text>
  <text x="440" y="180" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="14">Best Practices</text>
  
  <!-- SEO -->
  <circle cx="600" cy="110" r="50" fill="none" stroke="#4caf50" stroke-width="8"/>
  <circle cx="600" cy="110" r="50" fill="none" stroke="#2e7d32" stroke-width="8" stroke-dasharray="314" stroke-dashoffset="0" transform="rotate(-90 600 110)"/>
  <text x="600" y="115" text-anchor="middle" fill="#4caf50" font-family="Arial, sans-serif" font-size="28" font-weight="bold">100</text>
  <text x="600" y="180" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="14">SEO</text>
</svg>