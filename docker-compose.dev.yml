services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ragdb?schema=public
      - POSTGRES_PRISMA_URL=postgresql://postgres:postgres@db:5432/ragdb?schema=public&pgbouncer=true
      - POSTGRES_URL_NON_POOLING=postgresql://postgres:postgres@db:5432/ragdb?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rag-network

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ragdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rag-network
    command: >
      sh -c "
        docker-entrypoint.sh postgres &
        sleep 5 &&
        psql -U postgres -d ragdb -c 'CREATE EXTENSION IF NOT EXISTS vector;' || true &&
        wait
      "

  inngest:
    image: inngest/inngest:latest
    command: "inngest dev -u http://app:3000/api/inngest"
    ports:
      - "8288:8288"
    depends_on:
      - app
    networks:
      - rag-network

volumes:
  postgres_data:

networks:
  rag-network:
    driver: bridge
