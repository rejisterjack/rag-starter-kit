services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ragdb?schema=public
      - POSTGRES_PRISMA_URL=postgresql://postgres:postgres@db:5432/ragdb?schema=public&pgbouncer=true
      - POSTGRES_URL_NON_POOLING=postgresql://postgres:postgres@db:5432/ragdb?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rag-network

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ragdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rag-network
    command: >
      sh -c "
        docker-entrypoint.sh postgres &
        sleep 5 &&
        psql -U postgres -d ragdb -c 'CREATE EXTENSION IF NOT EXISTS vector;' || true &&
        wait
      "

  inngest:
    image: inngest/inngest:latest
    command: "inngest dev -u http://app:3000/api/inngest"
    ports:
      - "8288:8288"
    depends_on:
      - app
    networks:
      - rag-network

  # MinIO S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  # Create default buckets on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        sleep 5 &&
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/documents --ignore-existing &&
        mc mb local/exports --ignore-existing &&
        mc mb local/attachments --ignore-existing &&
        mc anonymous set download local/exports &&
        echo 'MinIO buckets created successfully'
      "
    networks:
      - rag-network

volumes:
  postgres_data:
  minio_data:

networks:
  rag-network:
    driver: bridge
