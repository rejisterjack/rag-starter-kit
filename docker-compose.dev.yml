# ============================================
# RAG Starter Kit - Docker Development Stack
# ============================================
#
# 🚀 QUICK START:
# 1. Copy .env.example to .env and add your API keys:
#    cp .env.example .env
#
# 2. Edit .env with your actual API keys:
#    - OPENROUTER_API_KEY (get free: https://openrouter.ai/keys)
#    - GOOGLE_API_KEY (get free: https://aistudio.google.com/app/apikey)
#    - NEXTAUTH_SECRET (generate: openssl rand -base64 32)
#
# 3. Start all services:
#    docker-compose up
#
# 4. Access the services:
#    - App: http://localhost:3000
#    - Prisma Studio: http://localhost:5555
#    - Inngest: http://localhost:8288
#    - MinIO Console: http://localhost:9001
#    - Plausible Analytics: http://localhost:8000
#
# ============================================

services:
  app:
    container_name: rag-app
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        - PNPM_CACHE_ID=rag-pnpm-store
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      # Service URLs (internal Docker network)
      - DATABASE_URL=postgresql://postgres:postgres@rag-db:5432/ragdb
      - REDIS_URL=redis://rag-redis:6379
      - S3_ENDPOINT=http://rag-minio:9000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - rag-network

  db:
    container_name: rag-db
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - rag-network

  redis:
    container_name: rag-redis
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rag-network

  minio:
    container_name: rag-minio
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  minio-init:
    container_name: rag-minio-init
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://rag-minio:9000 minioadmin minioadmin &&
        mc mb local/documents --ignore-existing &&
        mc mb local/exports --ignore-existing &&
        mc mb local/attachments --ignore-existing &&
        mc anonymous set download local/exports &&
        echo 'MinIO buckets created successfully'
      "
    networks:
      - rag-network

  inngest:
    container_name: rag-inngest
    image: inngest/inngest:latest
    command: "inngest dev -u http://rag-app:3000/api/inngest"
    ports:
      - "8288:8288"
    depends_on:
      - app
    networks:
      - rag-network

  clickhouse:
    container_name: rag-clickhouse
    image: clickhouse/clickhouse-server:24.3-alpine
    environment:
      - CLICKHOUSE_DB=plausible
      - CLICKHOUSE_USER=plausible
      - CLICKHOUSE_PASSWORD=plausible
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rag-network

  plausible:
    container_name: rag-plausible
    image: plausible/analytics:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@rag-db:5432/plausible
      - CLICKHOUSE_DATABASE_URL=http://plausible:plausible@rag-clickhouse:8123/plausible
      - SECRET_KEY_BASE=${PLAUSIBLE_SECRET_KEY_BASE}
      - BASE_URL=http://localhost:8000
      - DISABLE_REGISTRATION=false
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - rag-network

  prisma-studio:
    container_name: rag-prisma-studio
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@rag-db:5432/ragdb
    ports:
      - "5555:5555"
    command: ["pnpm", "prisma", "studio", "--port", "5555", "--browser", "none"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rag-network

volumes:
  postgres_data:
  minio_data:
  redis_data:
  clickhouse_data:

networks:
  rag-network:
    driver: bridge
