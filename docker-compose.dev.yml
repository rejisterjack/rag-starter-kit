services:
  app:
    container_name: rag-app
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        - PNPM_CACHE_ID=rag-pnpm-store
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"   # Next.js dev server
      - "5555:5555"   # Prisma Studio (make db-studio)
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      # Primary connection string used by the Prisma pg adapter at runtime
      - DATABASE_URL=postgresql://postgres:postgres@rag-db:5432/ragdb
      # Direct (unpooled) connection used by Prisma Migrate CLI
      - DATABASE_URL_UNPOOLED=postgresql://postgres:postgres@rag-db:5432/ragdb
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-rag-local-dev-placeholder-key-not-real}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY:-local}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY:-signkey-test-123456789}
      - S3_ENDPOINT=http://rag-minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_REGION=us-east-1
      - S3_FORCE_PATH_STYLE=true
      - S3_BUCKET_DOCUMENTS=documents
      - S3_BUCKET_EXPORTS=exports
      - S3_BUCKET_ATTACHMENTS=attachments
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rag-network

  db:
    container_name: rag-db
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port — use Prisma Studio (localhost:5555) or:
    #   docker compose -f docker-compose.dev.yml exec db psql -U postgres -d ragdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - rag-network

  inngest:
    container_name: rag-inngest
    image: inngest/inngest:latest
    command: "inngest dev -u http://rag-app:3000/api/inngest"
    ports:
      - "8288:8288"   # Inngest dashboard
    depends_on:
      - app
    networks:
      - rag-network

  minio:
    container_name: rag-minio
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # MinIO console (http://localhost:9001)
    # Port 9000 (API) is internal — the app reaches it via http://rag-minio:9000
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  minio-init:
    container_name: rag-minio-init
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://rag-minio:9000 minioadmin minioadmin &&
        mc mb local/documents --ignore-existing &&
        mc mb local/exports --ignore-existing &&
        mc mb local/attachments --ignore-existing &&
        mc anonymous set download local/exports &&
        echo 'MinIO buckets created successfully'
      "
    networks:
      - rag-network

volumes:
  postgres_data:
  minio_data:

networks:
  rag-network:
    driver: bridge
