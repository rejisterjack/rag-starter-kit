# Container Image Signing with Cosign and Sigstore
#
# Signs container images using keyless signing with Sigstore/Cosign
# Provides non-repudiation and provenance for container images
#
# Features:
# - Keyless signing using OIDC (no long-lived keys)
# - SLSA provenance attestation
# - SBOM attestation
# - Signature verification

name: Container Sign and Attest

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # Build and Push Container
  # ==========================================
  build:
    name: Build Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Required for Sigstore
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      - name: Set image output
        id: image
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ==========================================
  # Sign Container with Cosign
  # ==========================================
  sign:
    name: Sign Container Image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write # Required for Cosign keyless signing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.0'

      - name: Verify Cosign installation
        run: cosign version

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ==========================================
      # Keyless Signing with Sigstore
      # ==========================================
      - name: Sign container image
        run: |
          cosign sign --yes \
            --oidc-issuer https://token.actions.githubusercontent.com \
            --oidc-client-id sigstore \
            ${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

      # ==========================================
      # Generate and Sign SBOM Attestation
      # ==========================================
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdx \
            ${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

      # ==========================================
      # Generate and Sign SLSA Provenance
      # ==========================================
      - name: Generate SLSA provenance
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v1.9.0
        with:
          image: ${{ needs.build.outputs.image }}
          digest: ${{ needs.build.outputs.digest }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest SLSA provenance
        run: |
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance \
            ${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

      # ==========================================
      # Upload Signatures and Attestations
      # ==========================================
      - name: Upload attestation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: attestations-${{ github.run_id }}
          path: |
            sbom.spdx.json
            provenance.json
          retention-days: 90

  # ==========================================
  # Verify Signature
  # ==========================================
  verify:
    name: Verify Container Signature
    runs-on: ubuntu-latest
    needs: [build, sign]
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.0'

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github.com/${{ github.repository }}/.github/workflows/container-sign.yml@refs/(heads|tags)/.*$' \
            ${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

      - name: Verify SBOM attestation
        run: |
          cosign verify-attestation \
            --type spdx \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github.com/${{ github.repository }}/.github/workflows/container-sign.yml@refs/(heads|tags)/.*$' \
            ${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1

      - name: Output verification result
        run: |
          echo "✅ Container signature verified successfully"
          echo "Image: ${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}"
          echo "Signer: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"

  # ==========================================
  # Summary
  # ==========================================
  summary:
    name: Signing Summary
    runs-on: ubuntu-latest
    needs: [build, sign, verify]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Container Signing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sign | ${{ needs.sign.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify | ${{ needs.verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verification Commands" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Install cosign" >> $GITHUB_STEP_SUMMARY
          echo "curl -O -L https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64" >> $GITHUB_STEP_SUMMARY
          echo "chmod +x cosign-linux-amd64" >> $GITHUB_STEP_SUMMARY
          echo "sudo mv cosign-linux-amd64 /usr/local/bin/cosign" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Verify signature" >> $GITHUB_STEP_SUMMARY
          echo "cosign verify \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp '^https://github.com/${{ github.repository }}/.github/workflows/.*$' \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
