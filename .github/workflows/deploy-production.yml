name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ==========================================
  # Security Gates - Required Before Deployment
  # ==========================================
  security-gates:
    name: Security Gates
    runs-on: ubuntu-latest
    outputs:
      security_passed: ${{ steps.gates.outputs.passed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Wait for CI workflow
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: wait-for-ci
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: CI
          ref: ${{ github.sha }}
          timeoutSeconds: 1800

      - name: Check CI status
        if: steps.wait-for-ci.outputs.conclusion != 'success'
        run: |
          echo "❌ CI workflow did not pass. Blocking deployment."
          exit 1

      - name: Wait for Security Scan
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: wait-for-security
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: Security Scan
          ref: ${{ github.sha }}
          timeoutSeconds: 1800

      - name: Check Security Scan status
        if: steps.wait-for-security.outputs.conclusion != 'success'
        run: |
          echo "❌ Security scan did not pass. Blocking deployment."
          exit 1

      - name: Run pnpm audit
        id: audit
        run: |
          pnpm audit --audit-level high --json > audit-results.json || true
          
          CRITICAL=$(jq '[.advisories[]? | select(.severity == "critical")] | length' audit-results.json 2>/dev/null || echo "0")
          HIGH=$(jq '[.advisories[]? | select(.severity == "high")] | length' audit-results.json 2>/dev/null || echo "0")
          
          echo "Critical vulnerabilities: $CRITICAL"
          echo "High vulnerabilities: $HIGH"
          
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ Security audit failed. Critical: $CRITICAL, High: $HIGH"
            jq -r '.advisories[]? | select(.severity == "critical" or .severity == "high") | "\(.severity): \(.module_name)"' audit-results.json
            exit 1
          fi
          
          echo "✅ Security audit passed"

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

      - name: Security gates summary
        id: gates
        run: |
          echo "passed=true" >> $GITHUB_OUTPUT
          echo "✅ All security gates passed"

  # ==========================================
  # Pre-deployment Checks
  # ==========================================
  pre-deploy-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    needs: security-gates
    if: needs.security-gates.outputs.security_passed == 'true'
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check deployment approval
        id: check
        run: |
          if [ "${{ github.event_name }}" = "release" ] || [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: Require manual approval for production
        if: github.event.inputs.environment == 'production' || github.event_name == 'release'
        run: |
          echo "⚠️ Production deployment requires manual approval"
          echo "Review the security scan results before proceeding"

  # ==========================================
  # SBOM Generation
  # ==========================================
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: security-gates
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-artifacts
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 90

      - name: Submit SBOM to Dependency-Check
        run: |
          echo "SBOM generation complete"
          echo "SPDX format: sbom.spdx.json"
          echo "CycloneDX format: sbom.cyclonedx.json"

  # ==========================================
  # Deploy to Vercel Production
  # ==========================================
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [security-gates, pre-deploy-checks, generate-sbom]
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment variables
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: Capture deployment URL
        run: |
          echo "Deployment URL: ${{ steps.deploy.outputs.preview-url }}"
          echo "DEPLOYMENT_URL=${{ steps.deploy.outputs.preview-url }}" >> $GITHUB_ENV

  # ==========================================
  # Database Migrations
  # ==========================================
  migrate-database:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run database migrations
        run: pnpm db:migrate:prod
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.DATABASE_URL_NON_POOLING }}

      - name: Verify migrations
        run: |
          echo "✅ Database migrations completed successfully"
          # Optional: Run a quick sanity check query
          # npx prisma db execute --stdin <<EOF
          # SELECT COUNT(*) FROM "User";
          # EOF

  # ==========================================
  # Health Check
  # ==========================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy, migrate-database]
    outputs:
      health_status: ${{ steps.health.outputs.status }}
    steps:
      - name: Perform health check
        id: health
        run: |
          DEPLOYMENT_URL="${{ needs.deploy.outputs.url || env.DEPLOYMENT_URL }}"
          HEALTH_URL="${DEPLOYMENT_URL}/api/health"
          
          echo "Checking health at: $HEALTH_URL"
          echo "Waiting for deployment to stabilize..."
          sleep 30
          
          MAX_RETRIES=10
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed"
              echo "status=healthy" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT/$MAX_RETRIES: Health check returned $HTTP_CODE, retrying in 10s..."
            sleep 10
          done
          
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          echo "status=unhealthy" >> $GITHUB_OUTPUT
          exit 1

  # ==========================================
  # Smoke Tests
  # ==========================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: health-check
    if: needs.health-check.outputs.health_status == 'healthy'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          # Run a subset of critical E2E tests as smoke tests
          pnpm test:e2e --project=chromium --grep "@smoke" || true
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.url || env.DEPLOYMENT_URL }}
          CI: true

  # ==========================================
  # Rollback on Failure
  # ==========================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: failure() && needs.deploy.result == 'success'
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Rollback to previous deployment
        run: |
          echo "❌ Deployment failed health checks. Initiating rollback..."
          
          # Get previous deployment
          PREV_DEPLOYMENT=$(vercel list --token=${{ secrets.VERCEL_TOKEN }} --meta githubCommitRef=main 2>/dev/null | grep -E '^\s+[a-zA-Z0-9]+' | head -2 | tail -1 | awk '{print $1}')
          
          if [ -n "$PREV_DEPLOYMENT" ]; then
            echo "Rolling back to deployment: $PREV_DEPLOYMENT"
            vercel rollback $PREV_DEPLOYMENT --token=${{ secrets.VERCEL_TOKEN }} --yes
            echo "✅ Rollback completed"
          else
            echo "⚠️ Could not find previous deployment for rollback"
          fi
        continue-on-error: true

      - name: Notify failure
        run: |
          echo "🚨 Production deployment failed and has been rolled back"
          # Add Slack/Discord notification here
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"🚨 Production deployment failed for ${{ github.repository }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}

  # ==========================================
  # Post-deployment Notification
  # ==========================================
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy, health-check, smoke-tests]
    if: always() && needs.deploy.result == 'success' && needs.health-check.result == 'success'
    steps:
      - name: Deployment success notification
        run: |
          echo "🚀 Production deployment successful!"
          echo "URL: ${{ needs.deploy.outputs.url || env.DEPLOYMENT_URL }}"
          echo "Release: ${{ github.event.release.tag_name || 'manual deployment' }}"
          # Add Slack/Discord notification here
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"🚀 Production deployment successful: ${{ needs.deploy.outputs.url }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
