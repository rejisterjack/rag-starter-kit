name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  # ==========================================
  # Lint Job
  # ==========================================
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  # ==========================================
  # Type Check Job
  # ==========================================
  type-check:
    name: Type Check (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run TypeScript type check
        run: pnpm type-check

  # ==========================================
  # Test Job (Vitest Unit Tests)
  # ==========================================
  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ragdb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      POSTGRES_PRISMA_URL: postgres://postgres:postgres@localhost:5432/ragdb_test?pgbouncer=true&connect_timeout=15
      POSTGRES_URL_NON_POOLING: postgres://postgres:postgres@localhost:5432/ragdb_test
      NEXTAUTH_SECRET: test-secret-key-for-ci-only
      NEXTAUTH_URL: http://localhost:3000
      OPENAI_API_KEY: sk-test-key-for-ci-only
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup database
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Run unit tests
        run: pnpm test:unit --reporter=verbose

      - name: Run integration tests
        run: pnpm test:integration --reporter=verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 7

  # ==========================================
  # Build Job
  # ==========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build
        env:
          # Dummy env vars for build-time only
          POSTGRES_PRISMA_URL: postgres://dummy:dummy@localhost:5432/dummy
          POSTGRES_URL_NON_POOLING: postgres://dummy:dummy@localhost:5432/dummy
          NEXTAUTH_SECRET: dummy-secret-for-build-only
          OPENAI_API_KEY: sk-dummy-for-build-only
          NEXT_TELEMETRY_DISABLED: 1

  # ==========================================
  # Security Audit
  # ==========================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        id: audit
        run: |
          echo "Running security audit..."
          pnpm audit --audit-level moderate --json > audit-results.json || true
          
          # Check for critical and high vulnerabilities
          CRITICAL_COUNT=$(cat audit-results.json | jq '[.advisories[]? | select(.severity == "critical")] | length' 2>/dev/null || echo "0")
          HIGH_COUNT=$(cat audit-results.json | jq '[.advisories[]? | select(.severity == "high")] | length' 2>/dev/null || echo "0")
          
          echo "Critical vulnerabilities: $CRITICAL_COUNT"
          echo "High vulnerabilities: $HIGH_COUNT"
          
          if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::Found $CRITICAL_COUNT critical and $HIGH_COUNT high severity vulnerabilities"
            cat audit-results.json | jq -r '.advisories[]? | select(.severity == "critical" or .severity == "high") | "\(.severity): \(.module_name) - \(.title)"'
            exit 1
          fi
          
          echo "✅ No critical or high severity vulnerabilities found"

      - name: Check for outdated dependencies
        run: |
          echo "Checking for outdated dependencies..."
          pnpm outdated --format json > outdated.json 2>/dev/null || true
          
          MAJOR_OUTDATED=$(cat outdated.json | jq '[.[]? | select(.current != .latest)] | length' 2>/dev/null || echo "0")
          
          if [ "$MAJOR_OUTDATED" -gt 10 ]; then
            echo "::warning::Found $MAJOR_OUTDATED outdated dependencies. Consider updating."
          fi

      - name: Upload audit results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: security-audit-results
          path: audit-results.json
          retention-days: 30
