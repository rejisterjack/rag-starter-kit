name: 🐛 Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: checkboxes
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am using the latest version of the project
          required: true

  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is
      placeholder: When I try to upload a PDF document...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What you expected to happen
      placeholder: The document should upload successfully...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or error logs
      placeholder: Paste error logs here...

  - type: dropdown
    attributes:
      label: Environment
      description: How are you running the application?
      options:
        - Local Development (pnpm dev)
        - Vercel
        - Other
    validations:
      required: true

  - type: input
    attributes:
      label: Browser
      description: Browser and version (if applicable)
      placeholder: Chrome 120, Safari 17, etc.

  - type: input
    attributes:
      label: Node.js Version
      description: Run `node --version`
      placeholder: v20.10.0

  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context about the problem
