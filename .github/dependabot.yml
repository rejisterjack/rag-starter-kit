version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "your-github-username"
    assignees:
      - "your-github-username"
    commit-message:
      prefix: "chore"
      prefix-development: "chore(dev)"
      include: scope
    labels:
      - "dependencies"
      - "npm"
    groups:
      # Group minor and patch updates together
      minor-patch-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Group major updates separately for careful review
      major-dependencies:
        patterns:
          - "*"
        update-types:
          - "major"
    ignore:
      # Ignore Next.js major updates (requires manual migration)
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # Ignore React major updates (coordinate with Next.js)
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # Docker dependencies
  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: monthly
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "your-github-username"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "your-github-username"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: scope
