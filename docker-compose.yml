# RAG Starter Kit — Infrastructure Services
#
# Quick start:
#   1. cp .env.example .env && edit .env with your keys
#   2. docker compose up -d
#   3. pnpm dev
#
# Optional profiles:
#   --profile analytics   → Plausible analytics
#   --profile backup      → Scheduled DB backups

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ragdb
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 5

  minio-init:
    image: minio/minio
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin} &&
        mc mb --ignore-existing local/documents &&
        mc mb --ignore-existing local/exports &&
        mc mb --ignore-existing local/attachments &&
        mc anonymous set download local/exports
      "

  inngest:
    image: inngest/inngest:latest
    restart: unless-stopped
    command: "inngest dev -u http://host.docker.internal:${APP_PORT:-3000}/api/inngest --no-discovery"
    ports:
      - "${INNGEST_PORT:-8288}:8288"

  plausible:
    image: ghcr.io/plausible/community-edition:v2.1.4
    restart: unless-stopped
    profiles: ["analytics"]
    ports:
      - "${PLAUSIBLE_PORT:-8000}:8000"
    environment:
      BASE_URL: ${PLAUSIBLE_BASE_URL:-http://localhost:8000}
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE:-dev-secret-key-base-change-in-production-min-64-characters-long}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/plausible
      DISABLE_REGISTRATION: ${PLAUSIBLE_DISABLE_REGISTRATION:-false}
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      db:
        condition: service_healthy

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["backup"]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./backups:/backups
    command: >
      sh -c "
        while true; do
          pg_dump -h db -U postgres ragdb | gzip > /backups/backup-$$(date +%Y%m%d-%H%M%S).sql.gz &&
          find /backups -name 'backup-*.sql.gz' -mtime +7 -delete &&
          sleep 86400;
        done
      "
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
