# Redis configuration for RAG Starter Kit
# Optimized for caching and rate limiting

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Networking
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Security
# Uncomment and set password for production
# requirepass your-redis-password

# Logging
loglevel notice

# Limits
maxclients 10000

# Performance Tuning
databases 16
hz 10
dynamic-hz yes

# Lazy freeing
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# Threaded I/O
io-threads 2
io-threads-do-reads yes
