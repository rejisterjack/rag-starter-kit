apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  namespace: rag-starter-kit
  labels:
    app.kubernetes.io/name: rag-starter-kit
type: Opaque
stringData:
  # Database
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: CHANGE_ME_STRONG_PASSWORD
  POSTGRES_DB: ragdb
  DATABASE_URL: postgresql://postgres:CHANGE_ME_STRONG_PASSWORD@postgres:5432/ragdb

  # Redis
  REDIS_URL: redis://redis:6379

  # MinIO / S3
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY_ID: CHANGE_ME_MINIO_ACCESS_KEY
  S3_SECRET_ACCESS_KEY: CHANGE_ME_MINIO_SECRET_KEY
  S3_BUCKET_DOCUMENTS: documents
  S3_BUCKET_EXPORTS: exports
  S3_BUCKET_ATTACHMENTS: attachments

  # NextAuth
  NEXTAUTH_SECRET: CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_32
  NEXTAUTH_URL: http://localhost:3000

  # AI Providers (add your keys)
  OPENROUTER_API_KEY: CHANGE_ME
  GOOGLE_API_KEY: CHANGE_ME
  OPENAI_API_KEY: CHANGE_ME

  # Encryption
  ENCRYPTION_KEY: CHANGE_ME_GENERATE_32_BYTE_HEX

  # Analytics
  PLAUSIBLE_SECRET_KEY_BASE: CHANGE_ME_MIN_64_CHARACTERS
