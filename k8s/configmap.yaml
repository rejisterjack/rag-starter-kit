apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: rag-starter-kit
  labels:
    app.kubernetes.io/name: rag-starter-kit
data:
  # Application
  NODE_ENV: production
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  NEXT_TELEMETRY_DISABLED: "1"

  # AI Configuration
  LLM_PROVIDER: openrouter
  EMBEDDING_PROVIDER: google
  DEFAULT_MODEL: deepseek/deepseek-chat:free
  EMBEDDING_MODEL: text-embedding-004
  EMBEDDING_DIMENSIONS: "768"

  # Analytics
  NEXT_PUBLIC_ANALYTICS_HOST: http://plausible:8000
  NEXT_PUBLIC_ANALYTICS_SCRIPT_URL: http://plausible:8000/js/script.js
  PLAUSIBLE_BASE_URL: http://plausible:8000
  PLAUSIBLE_DISABLE_REGISTRATION: "true"

  # App URL
  NEXT_PUBLIC_APP_URL: http://localhost:3000

  # PostgreSQL
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"

  # Redis
  REDIS_HOST: redis
  REDIS_PORT: "6379"

  # MinIO
  MINIO_HOST: minio
  MINIO_PORT: "9000"
