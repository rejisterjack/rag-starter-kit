apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-app
  namespace: rag-starter-kit
  labels:
    app.kubernetes.io/name: rag-app
    app.kubernetes.io/part-of: rag-starter-kit
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-app
        app.kubernetes.io/part-of: rag-starter-kit
    spec:
      containers:
        - name: rag-app
          image: rag-starter-kit:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
      initContainers:
        - name: prisma-migrate
          image: rag-starter-kit:latest
          command:
            - sh
            - -c
            - npx prisma migrate deploy
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rag-app
  namespace: rag-starter-kit
  labels:
    app.kubernetes.io/name: rag-app
    app.kubernetes.io/part-of: rag-starter-kit
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: rag-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-ingress
  namespace: rag-starter-kit
  labels:
    app.kubernetes.io/name: rag-app
    app.kubernetes.io/part-of: rag-starter-kit
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: "rag-app"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  rules:
    - host: rag.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-app
                port:
                  number: 80
  tls:
    - hosts:
        - rag.example.com
      secretName: rag-tls-secret
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-app-hpa
  namespace: rag-starter-kit
  labels:
    app.kubernetes.io/name: rag-app
    app.kubernetes.io/part-of: rag-starter-kit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
