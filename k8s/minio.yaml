apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: rag-starter-kit
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: rag-starter-kit
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: rag-starter-kit
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: rag-starter-kit
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/part-of: rag-starter-kit
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          ports:
            - containerPort: 9000
              name: minio
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: S3_ACCESS_KEY_ID
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: S3_SECRET_ACCESS_KEY
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: rag-starter-kit
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: rag-starter-kit
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: minio
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: console
  selector:
    app.kubernetes.io/name: minio
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: rag-starter-kit
  labels:
    app.kubernetes.io/name: minio-init
    app.kubernetes.io/part-of: rag-starter-kit
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-init
        app.kubernetes.io/part-of: rag-starter-kit
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:latest
          env:
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: S3_SECRET_ACCESS_KEY
          command:
            - sh
            - -c
            - |
              mc alias set local http://minio:9000 $S3_ACCESS_KEY_ID $S3_SECRET_ACCESS_KEY &&
              mc mb local/documents --ignore-existing &&
              mc mb local/exports --ignore-existing &&
              mc mb local/attachments --ignore-existing &&
              mc anonymous set download local/exports &&
              echo 'MinIO buckets created successfully'
