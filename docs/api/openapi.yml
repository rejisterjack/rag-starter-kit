openapi: 3.1.0
info:
  title: RAG Starter Kit API
  description: |
    Production-ready RAG (Retrieval-Augmented Generation) API with:
    - Streaming chat completions
    - Document upload and processing
    - Vector search with pgvector
    - Real-time collaboration
    - Voice features
  version: 1.0.0
  contact:
    name: RAG Starter Kit Support
    url: https://github.com/rejisterjack/rag-starter-kit/issues
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: https://rag-starter-kit.vercel.app/api
    description: Production server

tags:
  - name: Chat
    description: RAG chat endpoints
  - name: Documents
    description: Document upload and management
  - name: Authentication
    description: Auth and session management
  - name: Workspaces
    description: Multi-user workspace management
  - name: Health
    description: Health and status checks

paths:
  /chat:
    post:
      summary: Send a chat message
      description: |
        Send a message to the RAG chatbot. Supports streaming responses.
        Requires authentication.
      tags:
        - Chat
      security:
        - bearerAuth: []
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            examples:
              streaming:
                summary: Streaming request
                value:
                  messages:
                    - role: user
                      content: What is RAG?
                  stream: true
                  chatId: chat_123
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'

  /documents:
    post:
      summary: Upload a document
      description: Upload a document (PDF, DOCX, TXT, MD) for RAG processing
      tags:
        - Documents
      security:
        - bearerAuth: []
        - sessionAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Document file (max 50MB)
                workspaceId:
                  type: string
              required:
                - file
      responses:
        '201':
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadResponse'

  /health:
    get:
      summary: Health check
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    sessionAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token

  schemas:
    ChatRequest:
      type: object
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant, system]
              content:
                type: string
        stream:
          type: boolean
          default: true

    ChatResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object

    DocumentUploadResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object

  responses:
    UnauthorizedError:
      description: Authentication required
    RateLimitError:
      description: Rate limit exceeded
