# =============================================================================
# Production Docker Compose Configuration
# =============================================================================
# This file sets up the complete production stack including:
# - Next.js application
# - PostgreSQL with pgvector
# - Redis (optional, for caching/rate limiting)
#
# Usage:
#   docker-compose -f docker/docker-compose.prod.yml up -d
# =============================================================================

version: "3.8"

services:
  # PostgreSQL with pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  # Redis for caching and rate limiting (optional)
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    command: >
      sh -c "
        echo 'maxmemory 256mb' > /usr/local/etc/redis/redis.conf &&
        echo 'maxmemory-policy allkeys-lru' >> /usr/local/etc/redis/redis.conf &&
        echo 'appendonly yes' >> /usr/local/etc/redis/redis.conf &&
        redis-server /usr/local/etc/redis/redis.conf
      "
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - NEXTAUTH_SECRET
        - DATABASE_URL
    container_name: rag-app
    restart: unless-stopped
    environment:
      # Database
      POSTGRES_PRISMA_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ragdb}?pgbouncer=true&connect_timeout=15
      POSTGRES_URL_NON_POOLING: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ragdb}

      # NextAuth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

      # OAuth (optional)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # AI/LLM
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Vector Search
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      DEFAULT_SIMILARITY_THRESHOLD: ${DEFAULT_SIMILARITY_THRESHOLD:-0.7}
      MAX_RETRIEVED_CHUNKS: ${MAX_RETRIEVED_CHUNKS:-5}

      # App Settings
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-4o-mini}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      DEFAULT_CHUNK_SIZE: ${DEFAULT_CHUNK_SIZE:-1000}
      DEFAULT_CHUNK_OVERLAP: ${DEFAULT_CHUNK_OVERLAP:-200}

      # Redis (optional)
      REDIS_URL: redis://redis:6379

      # Sentry (optional)
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}

      # Node
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - rag-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # Database backup service (optional)
  backup:
    image: postgres:16-alpine
    container_name: rag-backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
    command: >
      sh -c "
        mkdir -p /backups &&
        echo '#!/bin/sh' > /backup.sh &&
        echo 'export PGPASSWORD=\$$POSTGRES_PASSWORD' >> /backup.sh &&
        echo 'pg_dump -h db -U \$$POSTGRES_USER -d \$$POSTGRES_DB | gzip > /backups/backup-\$$(date +%Y%m%d-%H%M%S).sql.gz' >> /backup.sh &&
        echo 'find /backups -name \"backup-*.sql.gz\" -mtime +\$$BACKUP_RETENTION_DAYS -delete' >> /backup.sh &&
        chmod +x /backup.sh &&
        echo '0 2 * * * /backup.sh >> /var/log/cron.log 2>&1' | crontab - &&
        crond -f
      "
    depends_on:
      - db
    networks:
      - rag-network
    profiles:
      - backup

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  rag-network:
    driver: bridge

secrets:
  NEXTAUTH_SECRET:
    environment: NEXTAUTH_SECRET
  DATABASE_URL:
    environment: DATABASE_URL
