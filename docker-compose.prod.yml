# =============================================================================
# Production Docker Compose Configuration
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in .env.production or shell):
#   DATABASE_URL, DATABASE_URL_UNPOOLED, NEXTAUTH_SECRET, OPENAI_API_KEY
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector
  # ---------------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port binding — DB is internal to the Docker network.
    # Access via: docker compose exec db psql -U postgres -d ragdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # Redis (optional — for rate limiting / caching)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    # No host port binding — Redis is internal to the Docker network.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # MinIO S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    restart: unless-stopped
    # No host port binding — MinIO is accessed by the app internally.
    # To access the MinIO console temporarily:
    #   docker compose -f docker-compose.prod.yml port minio 9001
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  # Create default MinIO buckets on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin} &&
        mc mb local/${S3_BUCKET_DOCUMENTS:-documents} --ignore-existing &&
        mc mb local/${S3_BUCKET_EXPORTS:-exports} --ignore-existing &&
        mc mb local/${S3_BUCKET_ATTACHMENTS:-attachments} --ignore-existing &&
        mc anonymous set download local/${S3_BUCKET_EXPORTS:-exports} &&
        echo 'MinIO buckets created successfully'
      "
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # Next.js Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        - PNPM_CACHE_ID=rag-pnpm-store
    container_name: rag-app
    restart: unless-stopped
    environment:
      NODE_ENV: production

      # ── Database ────────────────────────────────────────────────────────────
      # Runtime connection (used by @prisma/adapter-pg pool)
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ragdb}}
      # Direct connection for Prisma Migrate (no pgbouncer)
      DATABASE_URL_UNPOOLED: ${DATABASE_URL_UNPOOLED:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ragdb}}

      # ── Auth ────────────────────────────────────────────────────────────────
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}

      # ── OAuth ───────────────────────────────────────────────────────────────
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}

      # ── AI / LLM ────────────────────────────────────────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}

      # ── Vector Search ───────────────────────────────────────────────────────
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      DEFAULT_SIMILARITY_THRESHOLD: ${DEFAULT_SIMILARITY_THRESHOLD:-0.7}
      MAX_RETRIEVED_CHUNKS: ${MAX_RETRIEVED_CHUNKS:-5}

      # ── App Settings ────────────────────────────────────────────────────────
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-4o-mini}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      DEFAULT_CHUNK_SIZE: ${DEFAULT_CHUNK_SIZE:-1000}
      DEFAULT_CHUNK_OVERLAP: ${DEFAULT_CHUNK_OVERLAP:-200}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}

      # ── Redis ───────────────────────────────────────────────────────────────
      REDIS_URL: redis://redis:6379

      # ── S3 / MinIO ──────────────────────────────────────────────────────────
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET_DOCUMENTS: ${S3_BUCKET_DOCUMENTS:-documents}
      S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS:-exports}
      S3_BUCKET_ATTACHMENTS: ${S3_BUCKET_ATTACHMENTS:-attachments}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}

      # ── Monitoring (optional) ───────────────────────────────────────────────
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://app.posthog.com}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}

      # ── Inngest ─────────────────────────────────────────────────────────────
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-}

    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rag-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------------------------------
  # Database backup (opt-in via --profile backup)
  # ---------------------------------------------------------------------------
  backup:
    image: postgres:16-alpine
    container_name: rag-backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
    command: >
      sh -c "
        mkdir -p /backups &&
        while true; do
          pg_dump -h db -U $$POSTGRES_USER -d $$POSTGRES_DB | gzip > /backups/backup-$$(date +%Y%m%d-%H%M%S).sql.gz &&
          find /backups -name 'backup-*.sql.gz' -mtime +$$BACKUP_RETENTION_DAYS -delete &&
          echo 'Backup completed' &&
          sleep 86400;
        done
      "
    depends_on:
      - db
    networks:
      - rag-network
    profiles:
      - backup

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  rag-network:
    driver: bridge
