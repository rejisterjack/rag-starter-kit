# =============================================================================
# RAG Starter Kit - Production Docker Compose
# =============================================================================
#
# 🚀 QUICK START:
# 1. Copy .env.example to .env and configure:
#    cp .env.example .env
#
# 2. Edit .env with production values:
#    - OPENROUTER_API_KEY (from https://openrouter.ai/keys)
#    - GOOGLE_API_KEY (from https://aistudio.google.com/app/apikey)
#    - NEXTAUTH_SECRET (generate: openssl rand -base64 32)
#    - POSTGRES_PASSWORD (generate a strong password)
#
# 3. Start production stack:
#    docker-compose -f docker-compose.prod.yml up -d
#
# 4. With backups enabled:
#    docker-compose -f docker-compose.prod.yml --profile backup up -d
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector
  # ---------------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # Redis for rate limiting, caching & presence
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # MinIO S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  minio-init:
    image: minio/mc:latest
    container_name: rag-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin} &&
        mc mb local/documents --ignore-existing &&
        mc mb local/exports --ignore-existing &&
        mc mb local/attachments --ignore-existing &&
        mc anonymous set download local/exports &&
        echo 'MinIO buckets created successfully'
      "
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # Plausible Analytics (self-hosted)
  # ---------------------------------------------------------------------------
  plausible:
    image: plausible/analytics:latest
    container_name: rag-plausible
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@db:5432/plausible
      - SECRET_KEY_BASE=${PLAUSIBLE_SECRET_KEY_BASE:-dev-secret-key-base-change-in-production-min-64-characters-long}
      - BASE_URL=${PLAUSIBLE_BASE_URL:-http://localhost:8000}
      - DISABLE_REGISTRATION=${PLAUSIBLE_DISABLE_REGISTRATION:-true}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # Next.js Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        - PNPM_CACHE_ID=rag-pnpm-store
    container_name: rag-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"

      # Service URLs (internal Docker network)
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/ragdb
      DATABASE_URL_UNPOOLED: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/ragdb
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000

      # AI Configuration
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-google}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-deepseek/deepseek-chat:free}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-004}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}

      # Auth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}

      # Analytics
      NEXT_PUBLIC_ANALYTICS_HOST: ${NEXT_PUBLIC_ANALYTICS_HOST:-http://localhost:8000}
      NEXT_PUBLIC_ANALYTICS_SCRIPT_URL: ${NEXT_PUBLIC_ANALYTICS_SCRIPT_URL:-http://localhost:8000/js/script.js}

      # App Settings
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_TELEMETRY_DISABLED: 1

    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rag-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------------------------------
  # Database backup (opt-in via --profile backup)
  # ---------------------------------------------------------------------------
  backup:
    image: postgres:16-alpine
    container_name: rag-backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: ragdb
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
    command: >
      sh -c "
        mkdir -p /backups &&
        while true; do
          pg_dump -h db -U postgres -d ragdb | gzip > /backups/backup-$$(date +%Y%m%d-%H%M%S).sql.gz &&
          find /backups -name 'backup-*.sql.gz' -mtime +$$BACKUP_RETENTION_DAYS -delete &&
          echo 'Backup completed at $$(date)' &&
          sleep 86400;
        done
      "
    depends_on:
      - db
    networks:
      - rag-network
    profiles:
      - backup

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  rag-network:
    driver: bridge
